version: '3.8'

services:
  onco-graph:
    build: .
    ports:
      - "8501:8501"
    environment:
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
    volumes:
      - .:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: rocm
              count: all
              capabilities: [gpu]